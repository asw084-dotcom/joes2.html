<!doctype html>
<html>
<head>
<title>joes2.html</title>
<style>
	body {
		font-family: Arial, sans-serif;
		margin: 20px;
	}
	h1 {
		color: #cc3300;
	}
	h2 {
		color: #333;
		border-bottom: 1px solid #ccc;
		padding-bottom: 5px;
	}
	.menu-section {
		margin-bottom: 20px;
		padding: 15px;
		background-color: #fff8e1;
		border: 1px solid #ddd;
		border-radius: 5px;
	}
	select {
		font-size: 16px;
		padding: 5px;
		margin: 10px 0;
	}
	button {
		font-size: 16px;
		padding: 8px 16px;
		margin: 5px 5px 5px 0;
		cursor: pointer;
		background-color: #cc3300;
		color: white;
		border: none;
		border-radius: 4px;
	}
	button:hover {
		background-color: #a52900;
	}
	#checkoutBtn {
		background-color: #2e7d32;
	}
	#checkoutBtn:hover {
		background-color: #1b5e20;
	}
	#cartArea {
		margin: 15px 0;
		padding: 15px;
		background-color: #e8f5e9;
		border: 1px solid #ccc;
		border-radius: 5px;
		min-height: 50px;
	}
</style>
</head>
<body>

<h1>Joe's Hotdogs</h1>

<script>

var menu = {
	Hotdog: 4.00,
	Fries: 3.50,
	Soda: 1.50,
	Sauerkraut: 1.00
};

document.write('<div class="menu-section">');
document.write("<h2>Menu</h2>");

var items = Object.keys(menu);
items.forEach(item => {
	document.write(item + " - $" + menu[item].toFixed(2) + "<br>");
});

document.write('</div>');


// Part 4

var selectHTML = '<select id="itemSelect">';
for (key in menu)
{
	selectHTML += '<option value="' + menu[key] + '">' + key + '</option>';
}
selectHTML += '</select>';

document.write(selectHTML);
document.write('<br>');
document.write('<button id="addBtn">Add to Cart</button>');
document.write('<div id="cartArea"><h2>Shopping Cart</h2><p>Cart is empty.</p></div>');
document.write('<button id="checkoutBtn">Checkout</button>');

</script>

<script>

// Part 5

var cart = {};
for (key in menu)
{
	cart[key] = 0;
}

function updateCart()
{
	var cartDiv = document.getElementById("cartArea");
	var s = "<h2>Shopping Cart</h2>";
	var hasItems = false;

	for (key in cart)
	{
		if (cart[key] > 0)
		{
			s += key + " x " + cart[key] + "<br>";
			hasItems = true;
		}
	}

	if (!hasItems)
	{
		s += "<p>Cart is empty.</p>";
	}

	cartDiv.innerHTML = s;
}

document.getElementById("addBtn").onclick = function()
{
	var sel = document.getElementById("itemSelect");
	var itemName = sel.options[sel.selectedIndex].text;

	cart[itemName] += 1;

	updateCart();
}


// Part 6

document.getElementById("checkoutBtn").onclick = function()
{
	var msg = "=== Order Summary ===\n\n";
	var orderTotal = 0;
	var hasItems = false;

	for (key in cart)
	{
		if (cart[key] > 0)
		{
			hasItems = true;
			var itemTotal = cart[key] * menu[key];
			msg += key + ": qty " + cart[key] + " - $" + itemTotal.toFixed(2) + "\n";
			orderTotal += itemTotal;
		}
	}

	if (!hasItems)
	{
		alert("Your cart is empty!");
		return;
	}

	msg += "\nOrder Total: $" + orderTotal.toFixed(2);

	alert(msg);

	for (key in cart)
	{
		cart[key] = 0;
	}

	updateCart();
}

</script>

</body>
</html>
